<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e3a5f">模型体系架构</text>
  <rect x="360" y="70" width="240" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a5f">气象预警大模型</text>
  <text x="480" y="120" text-anchor="middle" font-size="11" fill="#64748b">核心模型</text>
  <rect x="80" y="180" width="160" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="160" y="205" text-anchor="middle" font-size="12" fill="#92400e">暴雨预警模型</text>
  <text x="160" y="218" text-anchor="middle" font-size="10" fill="#b45309">场景模型</text>
  <rect x="280" y="180" width="160" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="205" text-anchor="middle" font-size="12" fill="#92400e">强对流预警模型</text>
  <text x="360" y="218" text-anchor="middle" font-size="10" fill="#b45309">场景模型</text>
  <rect x="480" y="180" width="160" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="560" y="205" text-anchor="middle" font-size="12" fill="#92400e">高温预警模型</text>
  <text x="560" y="218" text-anchor="middle" font-size="10" fill="#b45309">场景模型</text>
  <rect x="680" y="180" width="200" height="50" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
