  <text x="780" y="218" text-anchor="middle" font-size="10" fill="#15803d">辅助模型</text>
  <line x1="160" y1="180" x2="160" y2="130" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
