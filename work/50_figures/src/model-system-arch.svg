  <line x1="560" y1="230" x2="480" y2="290" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="780" y1="230" x2="480" y2="290" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="360" y="400" width="240" height="50" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">API接入层</text>
