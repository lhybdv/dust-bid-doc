  <text x="670" y="520" text-anchor="middle" font-size="12" fill="#166534">第三方系统</text>
  <text x="670" y="535" text-anchor="middle" font-size="10" fill="#15803d">气象数据提供商</text>
  <line x1="480" y1="450" x2="290" y2="500" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="450" x2="670" y2="500" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="400" y="575" width="160" height="20" rx="4" fill="#e2e8f0"/>
  <text x="480" y="590" text-anchor="middle" font-size="10" fill="#64748b">副标：模型能力展示</text>
