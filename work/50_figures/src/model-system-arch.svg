  <line x1="560" y1="180" x2="560" y2="130" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="180" x2="780" y2="130" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="240" y="290" width="480" height="60" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3"/>
