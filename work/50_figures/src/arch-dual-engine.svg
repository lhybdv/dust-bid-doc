  <line x1="690" y1="380" x2="560" y2="420" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="480" y1="470" x2="480" y2="510" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
